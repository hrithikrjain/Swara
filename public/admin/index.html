<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Swara Admin — CMS</title>

  <!-- Branded preloader style -->
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Georgia', serif;
      background: linear-gradient(135deg, #1A0800 0%, #3A1A06 60%, #5C2D0E 100%);
      min-height: 100vh;
    }

    /* Preloader — hidden once CMS loads */
    #cms-preloader {
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, #1A0800 0%, #3A1A06 60%, #5C2D0E 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s ease;
    }
    #cms-preloader .logo-text {
      font-size: 48px;
      font-weight: 400;
      color: #FDF6EF;
      letter-spacing: 4px;
      margin-bottom: 8px;
    }
    #cms-preloader .tagline {
      font-family: system-ui, sans-serif;
      font-size: 11px;
      color: #C47B3A;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      margin-bottom: 40px;
    }
    #cms-preloader .spinner {
      width: 40px;
      height: 40px;
      border: 2px solid rgba(196, 123, 58, 0.2);
      border-top-color: #C47B3A;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Override Decap CMS default styles with brand colors */
    :root {
      --primary-color: #5C2D0E !important;
    }
  </style>
</head>
<body>

  <!-- Preloader (shown while CMS JS loads) -->
  <div id="cms-preloader">
    <div class="logo-text">Swara</div>
    <div class="tagline">Admin Panel · Loading</div>
    <div class="spinner"></div>
  </div>

  <!-- Decap CMS -->
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>

  <script>
    // Hide preloader once CMS is ready
    window.addEventListener('load', function() {
      setTimeout(function() {
        var preloader = document.getElementById('cms-preloader');
        if (preloader) {
          preloader.style.opacity = '0';
          setTimeout(function() { preloader.remove(); }, 500);
        }
      }, 800);
    });
  </script>
</body>
</html>
