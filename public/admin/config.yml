# ─────────────────────────────────────────────────────────────────────────────
# Decap CMS Configuration for Swara Ethnic Wear
# Hosted on Cloudflare Pages | GitHub Backend | OAuth via Pages Functions
# ─────────────────────────────────────────────────────────────────────────────

backend:
  name: github
  repo: hrithikrjain/Swara
  branch: main
  base_url: https://swara-1yy.pages.dev
  auth_endpoint: /api/auth

site_url: https://swara-1yy.pages.dev

# Media uploads go to /public/images/uploads/
media_folder: "public/images/uploads"
public_folder: "/images/uploads"

# Allow editorial workflow (draft → review → publish)
publish_mode: editorial_workflow

# ─────────────────────────────────────────────────────────────────────────────
# COLLECTIONS
# ─────────────────────────────────────────────────────────────────────────────

collections:

  # ── Products ─────────────────────────────────────────────────────────────
  - name: "products"
    label: "🛍️ Products"
    label_singular: "Product"
    folder: "content/products"
    create: true
    delete: true
    slug: "{{fields.id}}"
    identifier_field: name
    summary: "{{name}} — {{category}} — ₹{{price}}"
    sortable_fields: ["name", "category", "price", "featured"]

    fields:

      - label: "Product Name"
        name: "name"
        widget: "string"
        hint: "e.g. Rani Heritage Bridal Lehenga"

      - label: "Slug (URL ID)"
        name: "id"
        widget: "string"
        hint: "Unique URL-safe ID, e.g. rani-heritage-bridal-lehenga. No spaces."
        pattern: ['^[a-z0-9-]+$', "Lowercase letters, numbers, hyphens only"]

      - label: "Category"
        name: "category"
        widget: "select"
        options:
          - { label: "Bridal", value: "Bridal" }
          - { label: "Lehenga Choli", value: "Lehenga Choli" }
          - { label: "Ethnic Kurti", value: "Ethnic Kurti" }
          - { label: "Indo Western", value: "Indo Western" }
          - { label: "Navratri", value: "Navratri" }

      - label: "Price (₹)"
        name: "price"
        widget: "number"
        value_type: "int"
        min: 100
        hint: "Price in Indian Rupees (without ₹ symbol)"

      - label: "Original Price (₹) — for showing discount"
        name: "originalPrice"
        widget: "number"
        value_type: "int"
        required: false
        hint: "Leave blank if no discount to show"

      - label: "Short Description"
        name: "description"
        widget: "text"
        hint: "2–3 sentences about the product."

      - label: "Product Details (bullet points)"
        name: "details"
        widget: "list"
        field:
          label: "Detail"
          name: "detail"
          widget: "string"
        hint: "Key features: fabric, embroidery, inclusions, etc."

      - label: "Product Images"
        name: "images"
        widget: "list"
        allow_add: true
        min: 1
        max: 6
        field:
          label: "Image"
          name: "image"
          widget: "image"
        hint: "First image is the main display image. You can use existing /images/... paths."

      - label: "Badge Label"
        name: "badge"
        widget: "select"
        required: false
        options:
          - { label: "None", value: "" }
          - { label: "Bestseller", value: "Bestseller" }
          - { label: "New Arrival", value: "New Arrival" }
          - { label: "Trending", value: "Trending" }
          - { label: "Hot Pick", value: "Hot Pick" }
          - { label: "Exclusive", value: "Exclusive" }
          - { label: "Premium", value: "Premium" }
          - { label: "Artisan Pick", value: "Artisan Pick" }
          - { label: "Festival Special", value: "Festival Special" }

      - label: "Fabric"
        name: "fabric"
        widget: "string"
        hint: "e.g. Pure Silk, Georgette, Chanderi"

      - label: "Occasion Tags"
        name: "occasion"
        widget: "list"
        field:
          label: "Occasion"
          name: "tag"
          widget: "select"
          options:
            - Bridal
            - Wedding
            - Sangeet
            - Reception
            - Festival
            - Navratri
            - Garba
            - Party
            - Cocktail
            - Office
            - Casual
            - Daily Wear
            - Formal
            - Summer

      - label: "Available Colors"
        name: "colors"
        widget: "list"
        field:
          label: "Color"
          name: "color"
          widget: "string"
        hint: "e.g. Deep Red, Gold, Ivory"

      - label: "Available Sizes"
        name: "sizes"
        widget: "select"
        multiple: true
        options:
          - { label: "XS", value: "XS" }
          - { label: "S", value: "S" }
          - { label: "M", value: "M" }
          - { label: "L", value: "L" }
          - { label: "XL", value: "XL" }
          - { label: "XXL", value: "XXL" }
          - { label: "Free Size", value: "Free Size" }
          - { label: "Custom", value: "Custom" }

      - label: "Featured on Homepage"
        name: "featured"
        widget: "boolean"
        default: false
        hint: "Shows in the Featured Collections section on homepage"

      - label: "Bestseller"
        name: "bestSeller"
        widget: "boolean"
        default: false
        hint: "Shows in the Bestsellers section on homepage"

      - label: "In Stock"
        name: "inStock"
        widget: "boolean"
        default: true


  # ── Homepage Hero Slides ──────────────────────────────────────────────────
  - name: "homepage"
    label: "🏠 Homepage"
    files:

      - label: "Hero Slides (Top Carousel)"
        name: "hero"
        file: "content/data/hero-slides.json"
        fields:
          - label: "Slides"
            name: "items"
            widget: "list"
            summary: "{{fields.label}}"
            min: 1
            max: 6
            fields:
              - { label: "Slide ID", name: "id", widget: "string", hint: "Unique ID e.g. slide-1" }
              - label: "Background Image"
                name: "image"
                widget: "image"
                hint: "Use portrait/tall images for best desktop display"
              - { label: "Category Label", name: "label", widget: "string", hint: "e.g. Bridal Collection" }
              - label: "Headline"
                name: "headline"
                widget: "string"
                hint: "Use \\n to split into two lines"
              - { label: "Sub-headline", name: "sub", widget: "text" }
              - { label: "Button Label", name: "ctaLabel", widget: "string", hint: "e.g. Explore Bridal" }
              - { label: "Button Link", name: "ctaHref", widget: "string", hint: "e.g. /collections/bridal" }

      - label: "Instagram Grid"
        name: "instagram"
        file: "content/data/instagram.json"
        fields:
          - label: "Grid Images"
            name: "items"
            widget: "list"
            summary: "{{fields.alt}}"
            min: 4
            max: 12
            fields:
              - { label: "ID", name: "id", widget: "string" }
              - { label: "Image", name: "src", widget: "image" }
              - { label: "Alt Text", name: "alt", widget: "string" }
              - { label: "Caption", name: "caption", widget: "string", required: false }

      - label: "Testimonials"
        name: "testimonials"
        file: "content/data/testimonials.json"
        fields:
          - label: "Testimonials"
            name: "items"
            widget: "list"
            summary: "{{fields.name}} — {{fields.city}}"
            fields:
              - { label: "ID", name: "id", widget: "string" }
              - { label: "Customer Name", name: "name", widget: "string" }
              - { label: "City", name: "city", widget: "string" }
              - { label: "Role / Tag", name: "role", widget: "string", hint: "e.g. Bride, Regular Customer" }
              - label: "Star Rating"
                name: "rating"
                widget: "select"
                options:
                  - { label: "5 Stars ⭐⭐⭐⭐⭐", value: 5 }
                  - { label: "4 Stars ⭐⭐⭐⭐", value: 4 }
                  - { label: "3 Stars ⭐⭐⭐", value: 3 }
                default: 5
              - { label: "Review Text", name: "review", widget: "text" }
              - { label: "Product Purchased", name: "product", widget: "string", required: false }
              - { label: "Avatar Letter", name: "avatar", widget: "string", hint: "Single letter shown as avatar, e.g. P for Priya" }


  # ── Categories ────────────────────────────────────────────────────────────
  - name: "categories"
    label: "📂 Categories"
    files:
      - label: "All Categories"
        name: "categories"
        file: "content/data/categories.json"
        fields:
          - label: "Categories"
            name: "items"
            widget: "list"
            summary: "{{fields.name}}"
            fields:
              - { label: "ID", name: "id", widget: "string" }
              - { label: "Category Name", name: "name", widget: "string" }
              - { label: "Slug (URL path)", name: "slug", widget: "string", hint: "e.g. lehenga-choli" }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Hero Image", name: "image", widget: "image" }


  # ── Pages ─────────────────────────────────────────────────────────────────
  - name: "pages"
    label: "📄 Pages"
    files:

      - label: "About Page"
        name: "about"
        file: "content/pages/about.json"
        fields:
          - { label: "Hero Image", name: "heroImage", widget: "image" }
          - { label: "Page Headline", name: "headline", widget: "string" }
          - { label: "Story Paragraph 1", name: "story1", widget: "text" }
          - { label: "Story Paragraph 2", name: "story2", widget: "text" }
          - { label: "Story Paragraph 3", name: "story3", widget: "text" }
          - label: "Stats (Years / Products / Cities / etc.)"
            name: "stats"
            widget: "list"
            summary: "{{fields.label}}"
            fields:
              - { label: "Number", name: "value", widget: "string" }
              - { label: "Label", name: "label", widget: "string" }
          - label: "Values / Pillars"
            name: "values"
            widget: "list"
            summary: "{{fields.title}}"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "desc", widget: "text" }
              - { label: "Icon (emoji or name)", name: "icon", widget: "string" }
          - label: "Store Images"
            name: "storeImages"
            widget: "list"
            field:
              label: "Image"
              name: "image"
              widget: "image"
          - { label: "Visit CTA Title", name: "visitCtaTitle", widget: "string" }
          - { label: "Visit CTA Body Text", name: "visitCtaText", widget: "text" }


  # ── Site Settings ──────────────────────────────────────────────────────────
  - name: "settings"
    label: "⚙️ Site Settings"
    files:

      - label: "Business Info & Contact"
        name: "business"
        file: "content/settings/business.json"
        fields:
          - { label: "Business Name", name: "name", widget: "string" }
          - { label: "Tagline", name: "tagline", widget: "string" }
          - { label: "WhatsApp Number (with country code)", name: "whatsapp", widget: "string", hint: "e.g. 919876543210 — no + or spaces" }
          - { label: "Phone (display)", name: "phone", widget: "string", hint: "e.g. +91 98765 43210" }
          - { label: "Email", name: "email", widget: "string" }
          - { label: "Store Address", name: "address", widget: "text" }
          - { label: "Store Hours", name: "hours", widget: "text" }
          - { label: "Instagram Handle", name: "instagram", widget: "string", hint: "Without @ symbol" }

      - label: "Announcement Bar"
        name: "announcements"
        file: "content/settings/announcements.json"
        fields:
          - label: "Announcements (ticker bar at top)"
            name: "items"
            widget: "list"
            min: 1
            max: 8
            field:
              label: "Announcement Text"
              name: "text"
              widget: "string"
            hint: "These rotate in the ticker bar at the top of every page"
